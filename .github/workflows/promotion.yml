name: Promotion

# Automated Stable cut: on a weekly schedule (and on-demand) this (1) checks whether
# nightly has anything main doesn't, (2) verifies nightly is green (lint + build),
# and only then (3) promotes nightly → main via promote.sh — which sets main's tree
# to nightly's and pushes, triggering ci.yml's release job (build + publish the
# Stable DMG + bump the cask). No manual step, and a red verify never reaches Stable
# because `promote` needs it. Mirrors Crisp's promotion flow, simplified for Quill's
# single Xcode project (no website / Python engine).
#
# REQUIRES the PROMOTION_TOKEN secret — a fine-grained PAT with Contents: R/W,
# Pull requests: R/W, and Workflows: R/W. It must be a PAT, NOT the default
# GITHUB_TOKEN: a push to main made with GITHUB_TOKEN does NOT trigger ci.yml, so
# the Stable release would never build; and a promotion can change files under
# .github/workflows, which needs the Workflows scope.
on:
  schedule:
    # Thursday 09:00 UTC (= 14:00 PKT, no DST). Cron can be delayed under load.
    - cron: "0 9 * * 4"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: promotion
  cancel-in-progress: false

jobs:
  check:
    name: Anything to promote?
    runs-on: ubuntu-latest
    if: github.repository == 'rafay99-epic/Quill'
    permissions:
      contents: read
    outputs:
      promote: ${{ steps.diff.outputs.promote }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: nightly
      - name: Diff main vs nightly
        id: diff
        run: |
          git fetch --quiet origin \
            "+refs/heads/main:refs/remotes/origin/main" \
            "+refs/heads/nightly:refs/remotes/origin/nightly"
          if git diff --quiet refs/remotes/origin/main refs/remotes/origin/nightly; then
            echo "main already equals nightly — nothing to promote."
            echo "promote=false" >> "$GITHUB_OUTPUT"
          else
            echo "promote=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Require PROMOTION_TOKEN
        if: steps.diff.outputs.promote == 'true'
        env:
          TOK: ${{ secrets.PROMOTION_TOKEN }}
        run: |
          if [ -z "${TOK:-}" ]; then
            echo "::error::Auto-promotion needs the PROMOTION_TOKEN secret — a fine-grained PAT with Contents: R/W, Pull requests: R/W, and Workflows: R/W. It must be a PAT (not GITHUB_TOKEN): a GITHUB_TOKEN push to main does NOT trigger ci.yml's release, and a promotion may change .github/workflows files."
            exit 1
          fi

  # The gate that protects Stable: lint + build nightly's tip. If it fails,
  # `promote` (which needs it) is skipped and nothing reaches main.
  verify:
    name: Verify nightly (lint · build)
    needs: check
    if: needs.check.outputs.promote == 'true'
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: nightly
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: SwiftLint
        run: swiftlint --reporter github-actions-logging
      - name: Cache whisper.cpp framework
        uses: actions/cache@v4
        with:
          path: ~/VoiceInk-Dependencies
          key: whisper-xcframework-v1
      - name: Free disk space
        run: |
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/* 2>/dev/null || true
          sudo rm -rf ~/Library/Developer/CoreSimulator/Caches/* 2>/dev/null || true
      - name: Build (compile gate)
        run: ./build.sh

  promote:
    name: Promote nightly → main (cut Stable)
    needs: [check, verify]
    if: needs.check.outputs.promote == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — promote.sh walks main..nightly
          ref: nightly # always promote nightly's tip
          # Persist the PAT so `git push origin main` in promote.sh is authored by
          # the PAT — which is what makes the push trigger ci.yml's release job.
          token: ${{ secrets.PROMOTION_TOKEN }}
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Promote (sets main to nightly, pushes → triggers the release)
        env:
          GH_TOKEN: ${{ secrets.PROMOTION_TOKEN }}
        run: bash .github/scripts/promote.sh --yes
